name: QEMRX Pharmacy — Deploy to Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. LINT & SYNTAX CHECK ─────────────────────────────
  check:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check syntax — all route files
        run: |
          node --check src/server.js
          node --check src/models/index.js
          node --check src/middleware/auth.js
          node --check src/routes/auth.js
          node --check src/routes/products.js
          node --check src/routes/orders.js
          node --check src/routes/payments.js
          node --check src/routes/prescriptions.js
          node --check src/routes/cart.js
          node --check src/routes/admin.js
          node --check src/routes/delivery.js
          node --check src/services/mpesa.js
          node --check src/services/email.js
          node --check src/services/sms.js
          node --check seed.js
          echo "✅ All files syntax OK"

      - name: Verify frontend exists
        run: |
          test -f public/index.html && echo "✅ Frontend present" || exit 1

  # ── 2. DEPLOY TO RENDER ────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -d '{"clearCache": false}'
          echo "✅ Render deploy triggered"

      - name: Wait and verify health
        run: |
          echo "Waiting 60 seconds for deploy..."
          sleep 60
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.APP_URL }}/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Deployment successful!"
          else
            echo "⚠️ Health check returned $STATUS - check Render logs"
          fi
