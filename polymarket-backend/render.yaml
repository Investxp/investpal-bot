services:
  - type: web
    name: investpal-bot
    env: python
    buildCommand: pip install -r polymarket-backend/requirements.txt
    startCommand: cd polymarket-backend && python server.py
    healthCheckPath: /api/health
    envVars:
      - key: POLYMARKET_PRIVATE_KEY
        sync: false
      - key: POLYMARKET_BUILDER_KEY
        sync: false
      - key: POLYMARKET_BUILDER_SECRET
        sync: false
      - key: POLYMARKET_BUILDER_PASSPHRASE
        sync: false
      - key: POLYMARKET_FUNDER_ADDRESS
        sync: false
      - key: CHAIN_ID
        value: "137"
      - key: PORT
        value: "8090"
      - key: PYTHONUNBUFFERED
        value: "1"
