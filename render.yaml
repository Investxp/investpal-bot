services:
  - type: web
    name: investpal-bot
    runtime: docker
    repo: https://github.com/Investxp/investpal-bot
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    envVars:
      - key: PORT
        value: 8080
      - key: POLYMARKET_PRIVATE_KEY
        sync: false
      - key: POLYMARKET_FUNDER_ADDRESS
        sync: false
      - key: POLYMARKET_USE_TOR
        value: "true"
      - key: POLYMARKET_PROXY
        sync: false
    healthCheckPath: /
    autoDeploy: true